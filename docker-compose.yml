version: '3.8'

services:
  # Redis - 低延迟实时广播
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - danmu

  # ClickHouse - 弹幕历史落库（替代 SQLite，见 3.1.3：写多读少的时序数据场景更适合列式存储）
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      - danmu

  # Kafka (KRaft 模式，无需 Zookeeper)
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=10
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped
    networks:
      - danmu

  # 弹幕服务器实例 1
  danmu-server-1:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8081:8080"
      - "6060:6060"
    environment:
      - DANMU_AUTH_TOKEN=${DANMU_AUTH_TOKEN:-danmu-secret-token}
    command: >
      ./server
      -addr=:8080
      -id=srv1
      -redis=redis:6379
      -kafka=kafka:9092
      -mq=both
      -pprof=:6060
    depends_on:
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - danmu

  # 弹幕服务器实例 2
  danmu-server-2:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8082:8080"
      - "6062:6060"
    environment:
      - DANMU_AUTH_TOKEN=${DANMU_AUTH_TOKEN:-danmu-secret-token}
    command: >
      ./server
      -addr=:8080
      -id=srv2
      -redis=redis:6379
      -kafka=kafka:9092
      -mq=both
      -pprof=:6060
    depends_on:
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - danmu

  # Kafka 落库消费者
  danmu-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    command: >
      ./consumer
      -kafka=kafka:9092
      -topic=danmu-history
      -clickhouse-addr=clickhouse:9000
      -clickhouse-db=default
      -clickhouse-user=default
      -clickhouse-password=
      -mode=storage
    depends_on:
      - kafka
      - clickhouse
    restart: unless-stopped
    networks:
      - danmu

  # Nginx 负载均衡（可选）
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - danmu-server-1
      - danmu-server-2
    restart: unless-stopped
    networks:
      - danmu

volumes:
  kafka_data:
  clickhouse_data:

networks:
  danmu:
    driver: bridge
