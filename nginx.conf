events {
    worker_connections 65535;
}

http {
    # ip_hash 固定用 $remote_addr 做哈希键：客户端经 CDN/反向代理接入后，
    # $remote_addr 会变成 CDN 节点 IP，导致同一用户被 ip_hash 打散到不同后端。
    # 改用 hash ... consistent，哈希键优先取 X-Forwarded-For（CDN/代理透传的真实客户端
    # IP），没有该头时退回 $remote_addr（直连场景不受影响）。
    # consistent 模式下节点增减只影响 1/N 的映射，比普通 hash 更适合服务端扩缩容。
    map $http_x_forwarded_for $client_identifier {
        ""      $remote_addr;
        default $http_x_forwarded_for;
    }

    upstream danmu_servers {
        hash $client_identifier consistent;
        server danmu-server-1:8080;
        server danmu-server-2:8080;
    }

    server {
        listen 80;

        # WebSocket 升级
        location /ws {
            proxy_pass http://danmu_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API 和静态文件
        location / {
            proxy_pass http://danmu_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
